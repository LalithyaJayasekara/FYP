<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- CONCEPT D: HANDSHAKE BRIDGE -->
  <!-- Emphasizes collaboration, trust, and partnership -->
  
  <defs>
    <linearGradient id="clinicalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00A86B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#20B2AA;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="workplaceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB81C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Left Hand (Clinical) -->
  <g transform="translate(40, 100)">
    <!-- Palm -->
    <ellipse cx="20" cy="0" rx="12" ry="18" fill="url(#clinicalGrad)"/>
    <!-- Fingers -->
    <rect x="8" y="-15" width="4" height="12" rx="2" fill="url(#clinicalGrad)"/>
    <rect x="14" y="-18" width="4" height="15" rx="2" fill="url(#clinicalGrad)"/>
    <rect x="20" y="-18" width="4" height="15" rx="2" fill="url(#clinicalGrad)"/>
    <rect x="26" y="-16" width="4" height="13" rx="2" fill="url(#clinicalGrad)"/>
    <!-- Thumb -->
    <ellipse cx="6" cy="-5" rx="3" ry="7" fill="url(#clinicalGrad)" transform="rotate(-30 6 -5)"/>
    <!-- Wrist detail -->
    <line x1="8" y1="20" x2="32" y2="20" stroke="url(#clinicalGrad)" stroke-width="2" opacity="0.5"/>
  </g>
  
  <!-- Right Hand (Workplace) -->
  <g transform="translate(120, 100) scale(-1, 1)">
    <!-- Palm -->
    <ellipse cx="20" cy="0" rx="12" ry="18" fill="url(#workplaceGrad)"/>
    <!-- Fingers -->
    <rect x="8" y="-15" width="4" height="12" rx="2" fill="url(#workplaceGrad)"/>
    <rect x="14" y="-18" width="4" height="15" rx="2" fill="url(#workplaceGrad)"/>
    <rect x="20" y="-18" width="4" height="15" rx="2" fill="url(#workplaceGrad)"/>
    <rect x="26" y="-16" width="4" height="13" rx="2" fill="url(#workplaceGrad)"/>
    <!-- Thumb -->
    <ellipse cx="6" cy="-5" rx="3" ry="7" fill="url(#workplaceGrad)" transform="rotate(-30 6 -5)"/>
    <!-- Wrist detail -->
    <line x1="8" y1="20" x2="32" y2="20" stroke="url(#workplaceGrad)" stroke-width="2" opacity="0.5"/>
  </g>
  
  <!-- Bridge Arch (formed by hands meeting) -->
  <path d="M 75 70 Q 100 45 125 70" stroke="#00A86B" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7"/>
  
  <!-- Connection Point (where hands meet) -->
  <circle cx="100" cy="100" r="8" fill="#2C3E50"/>
  <circle cx="100" cy="100" r="5" fill="#FFB81C" opacity="0.8"/>
  
  <!-- Decorative support lines -->
  <line x1="75" y1="75" x2="100" y2="100" stroke="#00A86B" stroke-width="1.5" opacity="0.4" stroke-dasharray="2,2"/>
  <line x1="125" y1="75" x2="100" y2="100" stroke="#FFB81C" stroke-width="1.5" opacity="0.4" stroke-dasharray="2,2"/>
  
  <!-- Trust indicator (subtle glow) -->
  <circle cx="100" cy="100" r="12" fill="none" stroke="#2C3E50" stroke-width="1" opacity="0.2" stroke-dasharray="2,2"/>
</svg>