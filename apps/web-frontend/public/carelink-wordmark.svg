<svg viewBox="0 0 620 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Premium gradients -->
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D98E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#007349;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE066;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F57C00;stop-opacity:1" />
    </linearGradient>
    
    <filter id="dropShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>
  
  <!-- Logo Icon (Left) -->
  <g transform="translate(20, 40)">
    <!-- Clinical Circle -->
    <circle cx="25" cy="35" r="20" fill="url(#tealGrad)" filter="url(#dropShadow)"/>
    
    <!-- Workplace Circle -->
    <circle cx="75" cy="35" r="20" fill="url(#goldGrad)" filter="url(#dropShadow)"/>
    
    <!-- Bridge Arc -->
    <path d="M 45 22 Q 50 10 55 22" stroke="#00A86B" stroke-width="3" fill="none" stroke-linecap="round"/>
    <line x1="45" y1="22" x2="55" y2="22" stroke="#00A86B" stroke-width="2" opacity="0.8"/>
    
    <!-- Stethoscope Icon -->
    <g transform="translate(25, 35)">
      <circle cx="-6" cy="-5" r="1.5" fill="white"/>
      <circle cx="6" cy="-5" r="1.5" fill="white"/>
      <path d="M -6 -5 Q 0 0 6 -5" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <path d="M -6 -5 Q -8 2 -6 6 M 6 -5 Q 8 2 6 6" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <circle cx="0" cy="8" r="2.5" fill="none" stroke="white" stroke-width="1.5"/>
    </g>
    
    <!-- Briefcase Icon -->
    <g transform="translate(75, 35)">
      <rect x="-7" y="-4" width="14" height="10" rx="1" fill="none" stroke="white" stroke-width="1.5"/>
      <path d="M -5 -4 Q -5 -8 0 -8 Q 5 -8 5 -4" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <line x1="-7" y1="1" x2="7" y2="1" stroke="white" stroke-width="1" opacity="0.7"/>
    </g>
  </g>
  
  <!-- Text: CareLink -->
  <text x="130" y="75" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="52" font-weight="700" fill="#2C3E50" letter-spacing="0.3">
    CareLink
  </text>
  
  <!-- Tagline -->
  <text x="130" y="100" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="400" fill="#00A86B" letter-spacing="0.1" opacity="0.9">
    Making workplaces truly inclusive for people with learning disabilities
  </text>
  
  <!-- Decorative line under tagline -->
  <line x1="130" y1="108" x2="430" y2="108" stroke="#FFB81C" stroke-width="2" opacity="0.6"/>
</svg>